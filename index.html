    <style>

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

            position: absolute;
            border: 4px solid #ef4444;
            border-radius: 50%;

        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-white text-center p-6" onclick="handleScreenTap(event)">

    <div id="ui-container" class="relative z-10 space-y-8">
        <div id="status-orb" class="w-48 h-48 mx-auto bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.5)] transition-all duration-500">
            <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-20a3 3 0 00-3 3v8a3 3 0 006 0V5a3 3 0 00-3-3z" />
            </svg>

        <div>
            <h1 id="status-text" class="text-4xl font-bold mb-4">Siap Membantu</h1>
            <p id="instruction-text" class="text-blue-200 text-xl">Ketuk layar dan sebutkan tujuan Anda</p>
        </div>

        <div id="loading-indicator" class="hidden flex justify-center space-x-2">
            <div class="w-3 h-3 bg-white rounded-full animate-bounce"></div>
            <div class="w-3 h-3 bg-white rounded-full animate-bounce [animation-delay:-.3s]"></div>
            <div class="w-3 h-3 bg-white rounded-full animate-bounce [animation-delay:-.5s]"></div>
        </div>
    </div>

    <!-- API Key Input (Hanya untuk keperluan setup) -->
    <div class="fixed bottom-4 left-4 right-4 opacity-10 hover:opacity-100 transition-opacity">
        <input type="password" id="AIzaSyCbu-WfmtdKmwiAB04H1EAPTzQcHWhhrZg" placeholder="AIzaSyCbu-WfmtdKmwiAB04H1EAPTzQcHWhhrZg" class="w-full p-2 bg-gray-800 rounded text-xs text-white border border-gray-700">
    </div>

    <script>
        const apiKeyInput = document.getElementById('api-key');
        const statusText = document.getElementById('status-text');
        const instructionText = document.getElementById('instruction-text');
        const orb = document.getElementById('status-orb');
        const pulse = document.getElementById('pulse-element');
        const loader = document.getElementById('loading-indicator');

        // Speech Synthesis Setup
        const synth = window.speechSynthesis;
        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'id-ID';
            utter.rate = 1.0;
            synth.speak(utter);
        }

        // Welcome Message
        window.onload = () => {
            setTimeout(() => {
                speak("Asisten navigasi aktif. Ketuk layar satu kali lalu sebutkan ke mana Anda ingin pergi.");
            }, 500);
        };

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            
            recognition.onstart = () => {
                statusText.innerText = "Mendengarkan...";
                instructionText.innerText = "Sebutkan tujuan sekarang";
                orb.className = "w-48 h-48 mx-auto bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(220,38,38,0.5)] transition-all duration-300";
                pulse.classList.remove('hidden');
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                statusText.innerText = "Memproses...";
                instructionText.innerText = `"${transcript}"`;
                await callGeminiAI(transcript);
            };

            recognition.onerror = () => {
                speak("Maaf, saya tidak mendengar. Ketuk lagi untuk mencoba.");
                resetUI();
            };

            recognition.onend = () => {
                resetUI();
            };
        }

        function resetUI() {
            orb.className = "w-48 h-48 mx-auto bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.5)] transition-all duration-300";
            pulse.classList.add('hidden');
            loader.classList.add('hidden');
        }

        function handleScreenTap(event) {
            // Ripple effect
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            ripple.style.left = `${event.clientX}px`;
            ripple.style.top = `${event.clientY}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            if (recognition) {
                try {
                    recognition.start();
                    const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                    audio.play().catch(() => {});
                } catch(e) {
                    // Recognition already started
                }
            }
        }

        // Gemini API Call with Exponential Backoff
        async function callGeminiAI(userQuery, retryCount = 0) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                speak("Mohon masukkan kunci API di bagian bawah layar terlebih dahulu.");
                return;
            }

            loader.classList.remove('hidden');
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const systemPrompt = "Anda adalah asisten navigasi suara untuk tunanetra. User akan menyebutkan tujuan. Berikan instruksi navigasi singkat, jelas, dan berurutan (step-by-step) untuk sampai ke sana dari lokasi saat ini secara hipotetis. Gunakan bahasa Indonesia yang ramah. Fokus pada arah kiri, kanan, dan jarak meter.";
            
            const payload = {
                contents: [{ parts: [{ text: `Tujuan saya: ${userQuery}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, rute tidak ditemukan.";
                
                statusText.innerText = "Navigasi Aktif";
                speak(aiResponse);

            } catch (error) {
                if (retryCount < 5) {
                    const waitTime = Math.pow(2, retryCount) * 1000;
                    setTimeout(() => callGeminiAI(userQuery, retryCount + 1), waitTime);
                } else {
                    speak("Maaf, terjadi gangguan koneksi. Silakan coba lagi nanti.");
                    resetUI();
                }
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
